name: CI
on:
  - push

env:
  # Keep in sync with jobs.build.container.image!
  BRANCH: v3.24
  # REPOS_DIR is the sftp user's home (the chroot root). The web server serves
  # only its `public/` subdirectory, so `.secret/` at the root is never exposed.
  REPOS_DIR: /home/ci/repos
  BUILD_REPOS: incubating
  PACKAGER_KEYNAME: jishin-alpine.oo@emunest.net-6a383316.rsa

jobs:
  build:
    # Native builds per arch: each runner pulls the matching alpine:3.24 image
    # (amd64 on the x86_64 runner, arm64 on the ARM runner), so $CARCH matches
    # the host and buildrepo writes each arch into its own
    # $REPODEST/<repo>/<arch>/ dir with its own signed APKINDEX. noarch aports
    # (e.g. jishin-dummy) get built once per arch into that arch's dir, which is
    # the standard Alpine layout apk expects.
    #
    # fail-fast stays OFF: the aarch64 wpewebkit-kumo build is a multi-run,
    # ccache-resumable cold start (see its APKBUILD) and will keep failing until
    # it converges -- we must not abort x86_64 over it.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # Serialize same-arch runs per branch. Two concurrent runs of the SAME arch
    # would race on the same $REPODEST/<repo>/<arch>/ apks + APKINDEX and on the
    # same wpewebkit-kumo-<arch>.tar.zst ccache tarball, corrupting both. The two
    # arches use disjoint paths, so they may safely build in parallel.
    # cancel-in-progress keeps iteration fast (a new push supersedes the stale
    # same-arch build); the ccache tarball still advances across completed runs.
    concurrency:
      group: ci-${{ matrix.arch }}-${{ github.ref }}
      cancel-in-progress: true
    container:
      image: alpine:3.24
      options: --privileged --device /dev/fuse
      volumes:
        - ${{ github.workspace }}:/home/ci/aports
        - /tmp:/tmp
    steps:
      - name: Checkout aports repository
        # GitHub's JavaScript actions (actions/checkout) only run inside
        # Alpine/musl containers on x86_64 runners; on arm64 they hard-fail
        # with "JavaScript Actions in Alpine containers are only supported on
        # x64 Linux runners". Do a plain `git clone` so both arches share one
        # code path. alpine:3.24's base image already ships /etc/apk/repositories
        # pointed at dl-cdn, so `apk add git` works here, before we (re)configure
        # our own repos below. The repo is public, so no token is required.
        run: |
          apk add --no-cache git
          git clone --quiet --branch "$GITHUB_REF_NAME" --depth 10 \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" /home/ci/aports

      - name: Copy packager key to /etc/apk/keys
        run: cp .keys/$PACKAGER_KEYNAME.pub /etc/apk/keys/

      - name: Configure Alpine repositories
        run: |
          cat > /etc/apk/repositories <<EOF
          https://alpine.packages.jishin.emunest.net/alpine/$BRANCH/incubating
          https://dl-cdn.alpinelinux.org/alpine/$BRANCH/main
          https://dl-cdn.alpinelinux.org/alpine/$BRANCH/community
          EOF
          # Ignore unavailable repos, this happens when bootstrapping a new branch.
          apk update || true

      - name: Install packages
        run: apk add alpine-sdk lua-aports sshfs ccache zstd

      - name: Add /home/ci/aports to git safe directories
        run: git config --global --add safe.directory /home/ci/aports

      - name: Mount remote package repository
        run: |
          umask 077
          mkdir -p /root/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /root/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > /root/.ssh/known_hosts

          umask 022
          mkdir -p "$REPOS_DIR"

          sshfs "${{ secrets.SSH_REMOTE }}" "$REPOS_DIR" \
            -o allow_other \
            -o auto_unmount \
            -o compression=yes \
            -o idmap=user \
            -o ServerAliveInterval=60

          rm /root/.ssh/id_ed25519

      - name: Prepare environment
        run: |
          adduser -u 1001 -G abuild -s /bin/sh -D ci
          addgroup ci wheel

          install -d -g abuild -m 775 /var/cache/distfiles
          install -d -o ci -g abuild -m 775 /tmp/ccache
          chown -R ci:abuild ./aports

          patch -d / -p 1 < aports/.github/workflows/files/abuild-sign.patch
          patch -d / -p 1 < aports/.github/workflows/files/buildrepo.patch

          sed -i "s/JOBS=[0-9]*/JOBS=$(nproc)/" /etc/abuild.conf

          mkdir -p .abuild
          echo "PACKAGER_PRIVKEY=$REPOS_DIR/.secret/$PACKAGER_KEYNAME" > .abuild/abuild.conf
        working-directory: /home/ci

      - name: Build packages
        run: |
          # Prepare arguments
          args=''
          if git log -1 --pretty=format:'%s %b' | grep -q -- '/keep-going'; then
            args='--keep-going'
          fi
          for repo in $BUILD_REPOS; do
            if [ -n "$(find $repo -maxdepth 2 -name APKBUILD)" ]; then
              args="$args $repo"
            fi
          done

          # During the build ccache uses a fast LOCAL dir (CCACHE_DIR=/tmp/ccache);
          # the wpewebkit-kumo APKBUILD persists it as a tarball on the sshfs mount
          # (CCACHE_PERSIST_DIR) before/after building, scoped to that package's
          # build(). An inner time cap (CCACHE_BUILD_BUDGET) makes the upload run
          # even on timeout, so a follow-up run resumes from the warm cache.
          su ci sh -c '
            ccache -M 5G 2>/dev/null || true
            ccache -z 2>/dev/null || true
            # Live ccache visibility: print stats every 15 min so you can watch
            # hits/misses climb in the log while the build runs, instead of
            # waiting for a whole (possibly 6h) run to see the final summary.
            ( while sleep 900; do
                echo "--- ccache stats @ $(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
                ccache -s 2>&1
              done ) &
            poll=$!
            buildrepo -d $REPODEST $@
            rc=$?
            kill $poll 2>/dev/null || true
            ccache -s
            exit $rc
          ' -- $args
        working-directory: /home/ci/aports
        env:
          # Write packages into the webroot (public/), which is disjoint from .secret/.
          REPODEST: ${{ env.REPOS_DIR }}/public/alpine/${{ env.BRANCH }}
          # Fast LOCAL cache used during the build (so ~9.4k hits don't round-trip
          # over sshfs); the APKBUILD persists it as a tarball on the mount below.
          # A full WebKit cache is ~1-2G; 5G gives headroom on the runner disk.
          CCACHE_DIR: /tmp/ccache
          # Remote mount dir holding the persisted tarball (next to public/, never
          # served). The APKBUILD only downloads/uploads when this is set.
          CCACHE_PERSIST_DIR: ${{ env.REPOS_DIR }}/.ccache-tb
          # Inner build cap (4h). The APKBUILD uploads the partial cache when it
          # fires, then fails the build so buildrepo moves on. Well under GitHub's
          # 6h job limit so the upload always completes.
          CCACHE_BUILD_BUDGET: '14400'

      - name: Unmount remote FS
        if: ${{ always() }}
        run: umount $REPOS_DIR
